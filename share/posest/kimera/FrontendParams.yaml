%YAML:1.0
# Kimera-VIO frontend parameters. This is Kimera's published EurocMono
# reference set verbatim, with one tweak: optical_flow_predictor_type
# is set to 1 so the gyro-based predictor is used (we have a real
# 1 kHz IMU stream and the rotational prior keeps tracking stable
# under the high ego-motion of an FRC robot).
#
# Originally posest carried a hand-written variant with snake_case
# field names; Kimera's parseYAML actually mixes camelCase and
# snake_case (CHECK_FATAL on missing keys), so anything but the
# verbatim reference set causes the daemon to abort at start. Tune by
# diffing against this file rather than rewriting it.

# Tracker
klt_win_size: 24
klt_max_iter: 30
klt_max_level: 4
klt_eps: 0.1
maxFeatureAge: 25

# Detector — 3 = GFTT (good corners on textured carpet).
feature_detector_type: 3
maxFeaturesPerFrame: 300

# GFTT specifics
quality_level: 0.001
min_distance: 20
block_size: 3
use_harris_detector: 0
k: 0.04

# FAST (unused when feature_detector_type=3 but the parser still reads it)
fast_thresh: 10

equalizeImage: 0
# Stereo-only fields (mono pipeline ignores). Kimera's parser CHECK_FATALs
# on missing keys, so we keep the EurocMono reference values rather than
# delete; do not waste time tuning these for mono.
nominalBaseline: 0.11                  # (stereo only)
toleranceTemplateMatching: 0.15        # (stereo only)
templ_cols: 101                        # (stereo only)
templ_rows: 11                         # (stereo only)
stripe_extra_rows: 0                   # (stereo only)
minPointDist: 0.5                      # (stereo only)
maxPointDist: 10                       # (stereo only)
bidirectionalMatching: 0               # (stereo only)

# Non-maximum suppression
max_nr_keypoints_before_anms: 2000
enable_non_max_suppression: 1
non_max_suppression_type: 6
nr_horizontal_bins: 7
nr_vertical_bins: 5
binning_mask: []

# Subpixel refinement
enable_subpixel_corner_finder: 1
max_iters: 40
epsilon_error: 0.001
window_size: 10
zero_zone: -1

subpixelRefinementStereo: 0            # (stereo only)
useSuccessProbabilities: 1
useRANSAC: 1
minNrMonoInliers: 10
minNrStereoInliers: 5                  # (stereo only)
ransac_threshold_mono: 1e-06
ransac_threshold_stereo: 1             # (stereo only)
ransac_use_1point_stereo: 1            # (stereo only)
ransac_use_2point_mono: 1
ransac_max_iterations: 100
ransac_probability: 0.995
ransac_randomize: 0
min_intra_keyframe_time: 0.2
max_intra_keyframe_time: 10.0
max_disparity_since_lkf: 200           # (stereo only)
minNumberFeatures: 0
useStereoTracking: 0
disparityThreshold: 0.5                # (stereo only)

# Optical-flow predictor: 1 = rotational (use IMU gyro). We have a
# real IMU; the rotational prior keeps tracking stable through the
# high yaw-rate spikes typical of an FRC swerve.
optical_flow_predictor_type: 1

# 2D-2D pose estimation
use_2d2d_tracking: 1
2d2d_algorithm: 1
optimize_2d2d_pose_from_inliers: 0

# 3D-3D pose estimation (stereo only).
use_3d3d_tracking: 0                   # (stereo only)
optimize_3d3d_pose_from_inliers: 0     # (stereo only)

# 2D-3D pose estimation (PnP)
use_pnp_tracking: 0
pnp_algorithm: 3
min_pnp_inliers: 10
ransac_threshold_pnp: 1.0
optimize_2d3d_pose_from_inliers: 0
